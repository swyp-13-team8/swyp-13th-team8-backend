spring:
  datasource:
    url: jdbc:h2:mem:silsonfit-db;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      indent-output: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # 로컬 개발용 공유 secret. HS256 기준 최소 32자 필요.
  secret: silsonfit-dev-secret-for-local-development-only-32chars

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE