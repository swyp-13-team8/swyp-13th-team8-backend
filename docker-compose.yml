services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: silsonfit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: ./silsonfit-api
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy}
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY:-dummy}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY:-dummy}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-silsonfit-storage}
      EDI_PUBLIC_API_SERVICE_KEY: ${EDI_PUBLIC_API_SERVICE_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/silsonfit

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres-data:
