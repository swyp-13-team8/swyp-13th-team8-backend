spring:
  datasource:
    url: jdbc:h2:mem:silsonfit-db;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      indent-output: true

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    retry:
      max-attempts: 1 # 실패 시 재시도 횟수 제한
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.1

jwt:
  # 로컬 개발용 공유 secret. HS256 기준 최소 32자 필요.
  secret: silsonfit-dev-secret-for-local-development-only-32chars

aws:
  s3:
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY:dummy}
      secret-key: ${AWS_S3_SECRET_KEY:dummy}
    region: ap-northeast-2
    bucket: silsonfit-bucket-594754931983-ap-northeast-2-an

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
