server {
    listen 80;
    server_name silsonfit.store www.silsonfit.store;
    client_max_body_size 50M;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name silsonfit.store www.silsonfit.store;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/silsonfit.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silsonfit.store/privkey.pem;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
